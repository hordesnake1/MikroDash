services:
  mikrodash:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: hordesnake1/mikrodash:staging
    container_name: mikrodash
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3081:3081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
